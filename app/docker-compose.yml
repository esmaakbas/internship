version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mobilab_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: mobilab_root_pass
      MYSQL_DATABASE: mobilab_app
      MYSQL_USER: mobilab_user
      MYSQL_PASSWORD: mobilab_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data: {}
