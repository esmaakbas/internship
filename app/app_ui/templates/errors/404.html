{% extends "layout.html" %}

{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<div class="container py-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-body py-5">
                    <i class="fas fa-exclamation-triangle text-danger" style="font-size: 5rem;"></i>
                    <h1 class="mt-4 mb-3">404 - Page Not Found</h1>
                    <p class="lead mb-4">The page you are looking for does not exist.</p>
                    <a href="/" class="btn btn-primary btn-lg">
                        <i class="fas fa-home"></i> Go Back to Homepage
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
